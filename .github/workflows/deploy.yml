name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global credential.helper store
          # Store credentials in the runner's store to avoid URL formatting issues
          echo "https://ranasummar0:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          git push --force https://huggingface.co/spaces/ranasummar0/JobScout-AI.git main:main