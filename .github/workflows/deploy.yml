name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # HEAD:main ka matlab hai ke jo bhi current code hai usay HF ki main branch par bhej do
        run: git push --force https://ranasummar0:$HF_TOKEN@huggingface.co/spaces/ranasummar0/JobScout-AI HEAD:main